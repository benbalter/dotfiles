name: CI
on: [push]
permissions:
  contents: read

env:
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  bootstrap:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pip Cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Venv cache
        uses: actions/cache@v4
        with:
          path: ./env
          key: ${{ runner.os }}-env-${{ hashFiles('requirements.txt') }}

      - name: Ansible cache
        uses: actions/cache@v4
        with:
          path: ~/.ansible
          key: ${{ runner.os }}-ansible-${{ hashFiles('requirements.yml') }}

      - name: Bootstrap
        run: script/bootstrap

      - name: Upload venv
        uses: actions/upload-artifact@v4
        with:
          name: venv
          path: env/

  test:
    needs: bootstrap
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ansible cache
        uses: actions/cache@v4
        with:
          path: ~/.ansible
          key: ${{ runner.os }}-ansible-${{ hashFiles('requirements.yml') }}

      - name: Download venv
        uses: actions/download-artifact@v4
        with:
          name: venv
          path: env/

      - name: Run playbook
        run: script/ansible

  lint:
    needs: bootstrap
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ansible cache
        uses: actions/cache@v4
        with:
          path: ~/.ansible
          key: ${{ runner.os }}-ansible-${{ hashFiles('requirements.yml') }}

      - name: Download venv
        uses: actions/download-artifact@v4
        with:
          name: venv
          path: env/

      - name: Lint
        run: script/lint

  unit-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install bats-core yq

      - name: Run tests
        run: script/test

  install-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run install.sh
        run: |
          chmod +x install.sh script/install-tools
          ./install.sh

      - name: Verify dotfile symlinks
        run: |
          for file in .asdfrc .digrc .gemrc .gitconfig .gitignore \
            .hushlogin .irbrc .pryrc .remarkrc .yamllint .zprofile .zshrc; do
            test -L "$HOME/$file" || { echo "FAIL: $file not symlinked"; exit 1; }
          done
          echo "All dotfile symlinks verified"

      - name: Verify tools installed
        run: |
          command -v delta
          command -v zoxide
          command -v fzf

      - name: Install bats and run unit tests
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q bats
          script/test

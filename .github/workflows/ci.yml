name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  bootstrap:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pip Cache
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Venv cache
        uses: actions/cache@v5
        with:
          path: ./env
          key: ${{ runner.os }}-env-${{ hashFiles('requirements.txt') }}

      - name: Ansible cache
        uses: actions/cache@v5
        with:
          path: ~/.ansible
          key: ${{ runner.os }}-ansible-${{ hashFiles('requirements.yml') }}

      - name: Bootstrap
        run: script/bootstrap

  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ansible cache
        uses: actions/cache@v5
        with:
          path: ~/.ansible
          key: ${{ runner.os }}-ansible-${{ hashFiles('requirements.yml') }}

      - name: Venv cache
        uses: actions/cache@v5
        with:
          path: ./env
          key: ${{ runner.os }}-env-${{ hashFiles('requirements.txt') }}

      - name: Bootstrap (if cache miss)
        run: script/bootstrap

      - name: Run playbook
        run: script/ansible

      - name: Verify dotfile symlinks
        run: |
          for file in .zshrc .zprofile .gitconfig .gitignore .yamllint .Brewfile \
            .config/mise/config.toml .config/starship.toml; do
            test -L "$HOME/$file" || { echo "FAIL: $file not symlinked"; exit 1; }
            target=$(readlink "$HOME/$file")
            expected="$GITHUB_WORKSPACE/$file"
            [ "$target" = "$expected" ] || { echo "FAIL: $file -> $target (expected $expected)"; exit 1; }
          done
          echo "All dotfile symlinks verified"

      - name: Verify expected directories exist
        run: |
          for dir in .bundle .config .gnupg .ssh github projects \
            "Library/Application Support/com.mitchellh.ghostty"; do
            test -d "$HOME/$dir" || { echo "FAIL: ~/$dir missing"; exit 1; }
          done
          echo "All required directories present"

      - name: Verify oh-my-zsh installed
        run: test -d "$HOME/.oh-my-zsh/.git"

      - name: Verify Homebrew installed
        run: |
          command -v brew
          brew --version

      - name: Verify macOS user defaults applied
        run: |
          autohide=$(defaults read com.apple.dock autohide)
          [ "$autohide" = "1" ] || { echo "FAIL: dock autohide=$autohide (expected 1)"; exit 1; }
          ss_type=$(defaults read com.apple.screencapture type)
          [ "$ss_type" = "png" ] || { echo "FAIL: screencapture type=$ss_type (expected png)"; exit 1; }
          ask_pw=$(defaults read com.apple.dock askForPassword)
          [ "$ask_pw" = "1" ] || { echo "FAIL: dock askForPassword=$ask_pw (expected 1)"; exit 1; }
          echo "macOS user defaults verified"

      - name: Re-run playbook (no failures on second run)
        run: |
          # Re-run to catch tasks that error on a second invocation.
          # Note: not asserting changed=0 because geerlingguy.mac.dock
          # always reports changed for dock item positions.
          output=$(script/ansible 2>&1)
          echo "$output"
          failed=$(echo "$output" | awk '/^localhost/ { for (i=1; i<=NF; i++) if ($i ~ /^failed=/) print substr($i, 8) }')
          [ "$failed" = "0" ] || { echo "FAIL: re-run reported failed=$failed (expected 0)"; exit 1; }
          echo "Playbook re-run completed without failures"

  lint:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ansible cache
        uses: actions/cache@v5
        with:
          path: ~/.ansible
          key: ${{ runner.os }}-ansible-${{ hashFiles('requirements.yml') }}

      - name: Venv cache
        uses: actions/cache@v5
        with:
          path: ./env
          key: ${{ runner.os }}-env-${{ hashFiles('requirements.txt') }}

      - name: Homebrew cache
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-brew-lint-shellcheck-shfmt-actionlint

      - name: Bootstrap (if cache miss)
        run: script/bootstrap

      - name: Install lint tools
        run: |
          brew install shellcheck shfmt actionlint
          gem install rubocop
          npm install

      - name: Lint
        run: script/lint

  unit-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Homebrew cache
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-brew-test-bats-core-yq

      - name: Install dependencies
        run: brew install bats-core yq

      - name: Run tests
        run: script/test

  install-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run install.sh
        run: |
          chmod +x install.sh script/install-tools
          ./install.sh

      - name: Verify dotfile symlinks
        run: |
          for file in .digrc .gemrc .gitconfig .gitignore \
            .hushlogin .irbrc .pryrc .remarkrc .yamllint .zprofile .zshrc; do
            test -L "$HOME/$file" || { echo "FAIL: $file not symlinked"; exit 1; }
          done
          echo "All dotfile symlinks verified"

      - name: Verify tools installed
        run: |
          command -v delta
          command -v zoxide
          command -v fzf

      - name: Install bats and run unit tests
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q bats
          script/test

  test-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Install bootstrap dependencies
        run: dnf install -y git python3 python3-pip sudo

      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap
        run: script/bootstrap

      - name: Run playbook
        run: script/ansible

      - name: Verify dotfile symlinks
        run: |
          for file in .zshrc .zprofile .gitconfig .gitconfig.linux .gitignore \
            .yamllint .config/mise/config.toml .config/starship.toml \
            .config/ghostty/config .ssh/config; do
            test -L "$HOME/$file" || { echo "FAIL: $file not symlinked"; exit 1; }
          done
          echo "All dotfile symlinks verified"

      - name: Verify macOS-only dotfiles were not symlinked
        run: |
          for file in .Brewfile .gitconfig.macos .mackup.cfg; do
            test ! -e "$HOME/$file" || { echo "FAIL: $file should not exist on Linux"; exit 1; }
          done
          echo "No macOS dotfiles leaked"

      # Homebrew (and the Brewfile toolchain) is gated to non-CI runs because
      # this Fedora container is root and Homebrew refuses to run as root.
      # Here we only verify the dnf bootstrap set; the test-asahi-brew job
      # exercises the Brewfile on Linux as a non-root user.
      - name: Verify bootstrap packages installed
        run: |
          for cmd in zsh git gcc make curl ps; do
            command -v "$cmd" || { echo "FAIL: $cmd not installed"; exit 1; }
          done

      - name: Verify oh-my-zsh installed
        run: test -d "$HOME/.oh-my-zsh/.git"

      - name: Verify zsh loads cleanly
        run: |
          ln -sfn "$GITHUB_WORKSPACE" "$HOME/.files"
          zsh -ic 'echo "zsh ok"'

      - name: Re-run playbook (no failures on second run)
        run: |
          output=$(script/ansible 2>&1)
          echo "$output"
          failed=$(echo "$output" | awk '/^localhost/ { for (i=1; i<=NF; i++) if ($i ~ /^failed=/) print substr($i, 8) }')
          [ "$failed" = "0" ] || { echo "FAIL: re-run reported failed=$failed (expected 0)"; exit 1; }
          echo "Playbook re-run completed without failures"

  # Validates that the Brewfile runs under `brew bundle` on Linux the way it
  # would on Asahi (Fedora aarch64), as a non-root user. Runs on both x86_64 and
  # native aarch64 GitHub-hosted runners — the aarch64 leg matches Asahi's
  # architecture and confirms arm64_linux bottles actually install. This proves
  # the Brewfile parses, that macOS-only entries are skipped, and that bottles
  # install on both arches; the full playbook wiring is still verified on real
  # hardware.
  test-asahi-brew:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    env:
      # Formulae with no Linux bottle (mirrors homebrew_linux_brew_skip).
      HOMEBREW_BUNDLE_BREW_SKIP: dockutil mas pinentry-mac
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ARM64 runner images don't ship Homebrew preinstalled like x86_64 ones do.
      - name: Ensure Homebrew is installed
        run: |
          if [ ! -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
            NONINTERACTIVE=1 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi

      - name: Brewfile parses under brew bundle on Linux
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew bundle list --file=Brewfile --all >/dev/null
          echo "Brewfile parses"

      - name: macOS-only entries are skipped, not errors, on Linux
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # A Brewfile of only macOS-specific entries must install cleanly on
          # Linux: the three bottle-less formulae via HOMEBREW_BUNDLE_BREW_SKIP,
          # and cask/mas entries via brew bundle's automatic Linux skip.
          cat > "$RUNNER_TEMP/Brewfile.macos-only" <<'EOF'
          brew 'dockutil'
          brew 'pinentry-mac'
          brew 'mas'
          cask '1password'
          mas '1Password for Safari', id: 1_569_813_296
          EOF
          brew bundle install --file="$RUNNER_TEMP/Brewfile.macos-only"
          echo "macOS-only entries skipped cleanly on Linux"

      - name: Install a representative subset (proves Linux bottles install)
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install gh jq ripgrep
          for cmd in gh jq rg; do
            command -v "$cmd" || { echo "FAIL: $cmd not installed via Homebrew"; exit 1; }
          done
          echo "Homebrew Linux bottles install correctly"

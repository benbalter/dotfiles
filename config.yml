---
configure_dock: true
dockitems_persist:
  - name: Google Chrome
    path: "/Applications/Google Chrome.app/"
    pos: 1
  - name: Spotify
    path: "/Applications/Spotify.app/"
    pos: 5
  - name: Visual Studio Code
    path: "/Applications/Visual Studio Code.app/"
    pos: 6
  - name: Slack
    path: "/Applications/Slack.app/"
    pos: 7
dockitems_remove:
  - Launchpad
  - Mail
  - Contacts
  - Calendar
  - Notes
  - Reminders
  - Maps
  - Photos
  - Messages
  - FaceTime
  - Music
  - Podcasts
  - TV
  - News
  - Books
  - "App Store"
  - "System Settings"

configure_sudoers: false

# Dotfiles symlinked into $HOME on every platform
dotfiles_files_common:
  - .bundle/config
  - .digrc
  - .gemrc
  - .gitconfig
  - .gitignore
  - .gnupg/gpg.conf
  - .hushlogin
  - .irbrc
  - .pryrc
  - .remarkrc
  - .yamllint
  - .zprofile
  - .zshrc
  - .config/mise/config.toml
  - .config/starship.toml

# Dotfiles symlinked into $HOME on macOS only
dotfiles_files_macos:
  - .Brewfile
  - .gitconfig.macos
  - .gnupg/gpg-agent.conf
  - .mackup.cfg
  - .ssh/config
  - Library/Application Support/Code/User/settings.json
  - Library/Application Support/com.mitchellh.ghostty/config
  - Library/Spelling/LocalDictionary
  - Library/LaunchAgents/com.balter.ben.tmpreaper.plist
  - Library/LaunchAgents/com.balter.ben.update.plist

# Dotfiles symlinked into $HOME on Linux only
dotfiles_files_linux:
  - .gitconfig.linux

# Linux symlinks whose destination differs from the repo path
# (configs shared with macOS but expected at XDG paths on Linux)
linux_dotfile_links:
  - src: .ssh/config.linux
    dest: .ssh/config
  - src: Library/Application Support/Code/User/settings.json
    dest: .config/Code/User/settings.json
  - src: Library/Application Support/com.mitchellh.ghostty/config
    dest: .config/ghostty/config

dotfiles_files: "{{ dotfiles_files_common + (dotfiles_files_macos if is_macos else dotfiles_files_linux) }}"

dotfile_root_dirs:
  - ""
  - "."

homebrew_upgrade_all_packages: false
homebrew_brewfile_dir: "{{ ansible_facts['user_dir'] }}/.files"
mas_upgrade_all_apps: false
mas_installed_apps: []
mas_signin_dialog: false

# Curated dev essentials installed via dnf on Fedora.
# (The Brewfile remains the source of truth on macOS; most of its entries
# are transitive deps that dnf resolves automatically.)
fedora_packages:
  - bats
  - cloc
  - fd-find
  - fzf
  - gh
  - git
  - git-delta
  - git-lfs
  - gnupg2
  - golang
  - httpie
  - jq
  - mise
  - mtr
  - nmap
  - nodejs
  - npm
  - ripgrep
  - ShellCheck
  - shfmt
  - starship
  - yamllint
  - zoxide
  - zsh
  # Build deps so `mise install ruby` can compile Ruby
  - autoconf
  - gcc
  - make
  - libyaml-devel
  - openssl-devel
  - readline-devel
  - zlib-devel

directories_to_create_common:
  - ~/.bundle
  - ~/.config
  - ~/.gnupg
  - ~/.ssh
  - ~/github
  - ~/projects

directories_to_create_macos:
  - ~/Library/Application Support/Code/User
  - ~/Library/Application Support/com.mitchellh.ghostty
  - ~/Library/LaunchAgents
  - ~/Library/Spelling

directories_to_create_linux:
  - ~/.config/Code/User
  - ~/.config/ghostty

directories_to_create: "{{ directories_to_create_common + (directories_to_create_macos if is_macos else directories_to_create_linux) }}"

macos_defaults:
  system:
    - name: App Store Auto-update
      domain: com.apple.commerce
      key: AutoUpdate
      type: bool
      value: true
    - name: App Store auto restart
      domain: com.apple.commerce
      key: AutoUpdateRestartRequired
      type: bool
      value: true
    - name: App Store Auto check
      domain: com.apple.SoftwareUpdate
      key: AutomaticCheckEnabled
      type: bool
      value: true
    - name: Set lock screen message
      domain: /Library/Preferences/com.apple.loginwindow.plist
      key: LoginwindowText
      value: "Found this computer? Please contact Ben Balter at ben@balter.com."
      type: string
    - name: Enable firewall
      domain: /Library/Preferences/com.apple.alf
      key: globalstate
      value: 1
      type: integer
    - name: Firewall stealth mode
      domain: com.apple.alf
      key: stealthenabled
      type: integer
      value: 1
    - name: Firewall logging
      domain: com.apple.alf
      key: loggingenabled
      type: integer
      value: 1
    - name: Auto-download updates
      domain: com.apple.SoftwareUpdate
      key: AutomaticDownload
      type: integer
      value: 1
    - name: Auto-install macOS updates
      domain: com.apple.SoftwareUpdate
      key: AutomaticallyInstallMacOSUpdates
      type: bool
      value: true
    - name: Install config data updates
      domain: com.apple.SoftwareUpdate
      key: ConfigDataInstall
      type: bool
      value: true
    - name: Install critical security updates
      domain: com.apple.SoftwareUpdate
      key: CriticalUpdateInstall
      type: integer
      value: 1
    - name: Library validation
      domain: com.apple.security.libraryvalidation
      key: DisableLibraryValidation
      type: bool
      value: false
    - name: Disable guest account
      domain: com.apple.MCX
      key: DisableGuestAccount
      type: bool
      value: true
    - name: Disable guest login
      domain: com.apple.loginwindow
      key: GuestEnabled
      type: bool
      value: false
    - name: Login window show name and password
      domain: com.apple.loginwindow
      key: SHOWFULLNAME
      type: bool
      value: true
    - name: Disable password hints
      domain: com.apple.loginwindow
      key: RetriesUntilHint
      type: integer
      value: 0
    - name: Limit ad tracking
      domain: com.apple.AdLib
      key: forceLimitAdTracking
      type: bool
      value: true
  user:
    - name: Hot corner
      domain: com.apple.dock
      key: wvous-br-corner
      type: integer
      value: 5
    - name: Auto hide dock
      domain: com.apple.dock
      key: autohide
      type: bool
      value: true
    - name: Screensaver ask for password
      domain: com.apple.dock
      key: askForPassword
      type: bool
      value: true
    - name: Screensaver delay
      domain: com.apple.dock
      key: askForPasswordDelay
      type: integer
      value: 0
    - name: Screenshot location
      domain: com.apple.screencapture
      key: location
      type: string
      value: ~/Desktop
    - name: Screenshot format
      domain: com.apple.screencapture
      key: type
      type: string
      value: png
    - name: Schedule auto update
      domain: com.apple.SoftwareUpdate
      key: ScheduleFrequency
      type: integer
      value: 1
    - name: Secure keyboard entry in Terminal
      domain: com.apple.Terminal
      key: SecureKeyboardEntry
      type: bool
      value: true

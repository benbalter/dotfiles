- name: Configure development environment
  hosts: localhost
  connection: local

  pre_tasks:
    - name: Detect CI environment
      ansible.builtin.set_fact:
        is_ci: "{{ ansible_facts['env']['CI'] | default(false) | bool }}"
      tags: always

    - name: Detect operating system
      ansible.builtin.set_fact:
        is_macos: "{{ ansible_facts['system'] == 'Darwin' }}"
        is_fedora: "{{ ansible_facts['distribution'] == 'Fedora' }}"
      tags: always

    - name: Include config
      ansible.builtin.include_vars: "{{ playbook_dir }}/config.yml"
      tags: always

    - name: Include CI config
      ansible.builtin.include_vars: "{{ playbook_dir }}/config_ci.yml"
      when: is_ci
      tags: always

  tasks:
    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop: "{{ directories_to_create }}"
      tags: [directories]

    - name: Setup Dotfiles
      tags: [dotfiles]
      block:
        - name: Ensure parent directories of dotfiles exist
          ansible.builtin.file:
            path: "{{ ansible_facts['user_dir'] }}/{{ item | dirname }}"
            state: directory
            mode: "0755"
          loop: "{{ dotfiles_files }}"
          when: item | dirname not in dotfile_root_dirs

        - name: Stat existing dotfile targets
          ansible.builtin.stat:
            path: "{{ ansible_facts['user_dir'] }}/{{ item }}"
          loop: "{{ dotfiles_files }}"
          register: dotfile_targets

        - name: Back up existing non-symlink dotfile targets
          ansible.builtin.command:
            cmd: mv "{{ ansible_facts['user_dir'] }}/{{ item.item }}" "{{ ansible_facts['user_dir'] }}/{{ item.item }}.bak"
            creates: "{{ ansible_facts['user_dir'] }}/{{ item.item }}.bak"
          loop: "{{ dotfile_targets.results }}"
          loop_control:
            label: "{{ item.item }}"
          when:
            - item.stat.exists
            - not item.stat.islnk

        - name: Symlink dotfiles into HOME
          ansible.builtin.file:
            src: "{{ playbook_dir }}/{{ item }}"
            dest: "{{ ansible_facts['user_dir'] }}/{{ item }}"
            state: link
            force: true
          loop: "{{ dotfiles_files }}"

    - name: Setup Linux dotfile links (XDG destinations)
      tags: [dotfiles]
      when: not is_macos
      block:
        - name: Stat existing Linux dotfile targets
          ansible.builtin.stat:
            path: "{{ ansible_facts['user_dir'] }}/{{ item.dest }}"
          loop: "{{ linux_dotfile_links }}"
          loop_control:
            label: "{{ item.dest }}"
          register: linux_dotfile_targets

        - name: Back up existing non-symlink Linux dotfile targets
          ansible.builtin.command:
            cmd: mv "{{ ansible_facts['user_dir'] }}/{{ item.item.dest }}" "{{ ansible_facts['user_dir'] }}/{{ item.item.dest }}.bak"
            creates: "{{ ansible_facts['user_dir'] }}/{{ item.item.dest }}.bak"
          loop: "{{ linux_dotfile_targets.results }}"
          loop_control:
            label: "{{ item.item.dest }}"
          when:
            - item.stat.exists
            - not item.stat.islnk

        - name: Symlink Linux dotfiles into HOME
          ansible.builtin.file:
            src: "{{ playbook_dir }}/{{ item.src }}"
            dest: "{{ ansible_facts['user_dir'] }}/{{ item.dest }}"
            state: link
            force: true
          loop: "{{ linux_dotfile_links }}"
          loop_control:
            label: "{{ item.dest }}"

    - name: Setup Homebrew
      ansible.builtin.include_role:
        name: geerlingguy.mac.homebrew
        apply:
          tags: [homebrew, packages]
      when: is_macos
      tags: [homebrew, packages]

    - name: Configure LanguageTool server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/homebrew/etc/languagetool/server.properties"
        dest: /opt/homebrew/etc/languagetool/server.properties
        mode: "0644"
      when: is_macos and not is_ci
      tags: [languagetool]

    - name: Setup Fedora packages
      become: true
      when: is_fedora
      tags: [fedora, packages]
      block:
        - name: Ensure dnf5 Python bindings are available
          ansible.builtin.command:
            cmd: dnf install -y python3-libdnf5
            creates: /usr/lib64/python3.*/site-packages/libdnf5

        # Homebrew provides the CLI toolchain (gh, mise, starship, etc.) on
        # Asahi, so the only third-party RPM repo we still need is 1Password's
        # for the desktop GUI app (Homebrew Cask is macOS-only).
        - name: Import 1Password RPM signing key
          ansible.builtin.rpm_key:
            key: https://downloads.1password.com/linux/keys/1password.asc
            state: present

        - name: Add 1Password repository
          ansible.builtin.yum_repository:
            name: 1password
            description: 1Password Stable Channel
            baseurl: https://downloads.1password.com/linux/rpm/stable/$basearch
            gpgcheck: true
            repo_gpgcheck: true
            gpgkey: https://downloads.1password.com/linux/keys/1password.asc

        # VS Code (aarch64 RPM) is installed via Microsoft's repo so the `code`
        # CLI is on PATH; the Brewfile's vscode extension entries then install
        # through `brew bundle`. (Homebrew Cask, which provides VS Code on
        # macOS, is unavailable on Linux.)
        - name: Import Microsoft RPM signing key
          ansible.builtin.rpm_key:
            key: https://packages.microsoft.com/keys/microsoft.asc
            state: present

        - name: Add VS Code repository
          ansible.builtin.yum_repository:
            name: code
            description: Visual Studio Code
            baseurl: https://packages.microsoft.com/yumrepos/vscode
            gpgcheck: true
            gpgkey: https://packages.microsoft.com/keys/microsoft.asc

        - name: Install packages
          ansible.builtin.dnf5:
            name: "{{ fedora_packages }}"
            state: present

        - name: Install VS Code
          ansible.builtin.dnf5:
            name: code
            state: present
          when: not is_ci

        - name: Install 1Password CLI
          ansible.builtin.dnf5:
            name: 1password-cli
            state: present
          when: not is_ci

        # The RPM repo only ships the desktop app for x86_64
        - name: Install 1Password desktop (RPM)
          ansible.builtin.dnf5:
            name: 1password
            state: present
          when: not is_ci and ansible_facts['architecture'] == 'x86_64'

        - name: Install 1Password desktop (aarch64 tarball)
          when: not is_ci and ansible_facts['architecture'] == 'aarch64'
          block:
            - name: Check for existing 1Password desktop install
              ansible.builtin.stat:
                path: /opt/1Password/1password
              register: op_desktop

            - name: Download and extract 1Password
              ansible.builtin.unarchive:
                src: https://downloads.1password.com/linux/tar/stable/aarch64/1password-latest.tar.gz
                dest: /opt
                remote_src: true
                extra_opts:
                  - --transform
                  - s,^1password-[^/]*,1Password,
              when: not op_desktop.stat.exists

            - name: Run 1Password after-install script
              ansible.builtin.command:
                cmd: /opt/1Password/after-install.sh
              when: not op_desktop.stat.exists
              changed_when: true

        - name: Set zsh as default shell
          ansible.builtin.user:
            name: "{{ ansible_facts['user_id'] }}"
            shell: /usr/bin/zsh

    # Homebrew is the package source of truth on Asahi, running the same
    # Brewfile as macOS. It must NOT run as root, so this block stays separate
    # from the become: true dnf block above. Skipped in CI (the Fedora CI
    # container runs as root); the test-asahi-brew job validates brew on Linux.
    - name: Setup Homebrew on Linux
      become: false
      when: is_fedora and not is_ci
      tags: [homebrew, packages]
      block:
        - name: Check for an existing Homebrew install
          ansible.builtin.stat:
            path: "{{ homebrew_linux_prefix }}/bin/brew"
          register: brew_bin

        - name: Install Homebrew
          ansible.builtin.shell:
            cmd: >-
              /bin/bash -c
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          environment:
            NONINTERACTIVE: "1"
          when: not brew_bin.stat.exists
          changed_when: true

        - name: Install Brewfile packages
          ansible.builtin.command:
            cmd: "{{ homebrew_linux_prefix }}/bin/brew bundle install --file={{ playbook_dir }}/Brewfile --no-upgrade"
          environment:
            HOMEBREW_BUNDLE_BREW_SKIP: "{{ homebrew_linux_brew_skip }}"
            HOMEBREW_NO_AUTO_UPDATE: "1"
          register: brew_bundle
          changed_when: "'Installing' in brew_bundle.stdout"

    - name: Set up oh-my-zsh
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh
        dest: "{{ ansible_facts['user_dir'] }}/.oh-my-zsh"
        version: master
        depth: 1
        single_branch: true
      tags: [ohmyzsh]

    - name: Setup App Store
      ansible.builtin.include_role:
        name: geerlingguy.mac.mas
        apply:
          tags: [mas, packages]
      when: is_macos
      tags: [mas, packages]

    # Runs as the user on both platforms: Homebrew owns the npm prefix on Asahi
    # (/home/linuxbrew) just as it does on macOS, so sudo would write root-owned
    # files into a user-owned tree.
    - name: Install GitHub Copilot CLI
      community.general.npm:
        name: "@github/copilot"
        global: true
      become: false
      when: not is_ci
      tags: [packages]

    - name: Setup Dock
      ansible.builtin.include_role:
        name: geerlingguy.mac.dock
        apply:
          tags: [macos, dock]
      when: is_macos
      tags: [macos, dock]

    - name: Set MacOS system defaults
      community.general.osx_defaults:
        domain: "{{ item.domain }}"
        key: "{{ item.key }}"
        type: "{{ item.type }}"
        value: "{{ item.value }}"
      become: true
      loop: "{{ macos_defaults.system }}"
      when: is_macos
      tags: [macos, defaults]

    - name: Set MacOS user defaults
      community.general.osx_defaults:
        domain: "{{ item.domain }}"
        key: "{{ item.key }}"
        type: "{{ item.type }}"
        value: "{{ item.value }}"
      loop: "{{ macos_defaults.user }}"
      when: is_macos
      tags: [macos, defaults]

    - name: Set screensaver idle time
      community.general.osx_defaults:
        domain: com.apple.screensaver
        key: idleTime
        type: integer
        value: 300
      when: is_macos and not is_ci
      tags: [macos, defaults]

    - name: Configure security settings
      tags: [macos, security]
      when: is_macos
      block:
        - name: Enable Gatekeeper
          ansible.builtin.command:
            cmd: spctl --master-enable
          become: true
          changed_when: false

        - name: Disable automatic login
          community.general.osx_defaults:
            domain: com.apple.loginwindow
            key: autoLoginUser
            state: absent
          become: true

        - name: Check FileVault status
          ansible.builtin.command:
            cmd: fdesetup status
          register: filevault_status
          changed_when: false

        - name: Enable FileVault
          ansible.builtin.command:
            cmd: fdesetup enable -defer /tmp/filevault-setup.plist
          become: true
          register: filevault_enable
          when: "'FileVault is On' not in filevault_status.stdout"
          changed_when: filevault_enable.rc == 0
          notify: FileVault restart reminder

        - name: Check TouchID PAM module availability
          ansible.builtin.stat:
            path: /usr/lib/pam/pam_tid.so
          register: pam_tid

        - name: Enable TouchID for sudo
          ansible.builtin.lineinfile:
            path: /etc/pam.d/sudo_local
            line: "auth       sufficient     pam_tid.so"
            insertafter: "^# sudo_local"
            create: true
            owner: root
            group: wheel
            mode: "0444"
          become: true
          when: pam_tid.stat.exists

  handlers:
    - name: FileVault restart reminder
      ansible.builtin.debug:
        msg: "FileVault will activate on next logout. Log out and back in to complete setup and save your recovery key."
